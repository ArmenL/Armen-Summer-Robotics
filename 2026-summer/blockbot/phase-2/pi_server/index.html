<!DOCTYPE html>
<html>
    <head>
        <title>BlockBot Dashboard</title>
    </head>
    <body>
        <p>Connection Status: <span id="connection_status">--</span></p>
        <h1>Welcome to the BlockBot Dashboard</h1>
        <p>Key Pressed: <span id="key">--</span></p>
        <p>Ticks: <span id="ticks">--</span></p>

    <script>
        async function updateTelemetry() {
            try {
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 800)
                const response = await fetch("/telemetry", { signal: controller.signal });
                const data = await response.json();

                document.getElementById("key").textContent = data.key;
                document.getElementById("ticks").textContent = data.ticks;
                document.getElementById("connection_status").textContent = "Connected";
        } catch (error) {
                document.getElementById("connection_status").textContent = "Disconnected";
                document.getElementById("key").textContent = "--";
                document.getElementById("ticks").textContent = "--";
        }
    }
        setInterval(updateTelemetry, 1000);
    </script>
    </body>
</html>
